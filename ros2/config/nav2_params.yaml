amcl:
  ros__parameters:
    use_sim_time: false
    base_frame_id: base_link
    odom_frame_id: odom
    scan_topic: /scan_fixed
    transform_tolerance: 1.0
    max_particles: 1000
    min_particles: 200
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    laser_max_range: 10.0
    laser_min_range: -1.0
    laser_max_beams: 60

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    expected_planner_frequency: 1.0
    action_server_result_timeout: 300.0
    wait_for_service_timeout: 60
    server_response_timeout: 60.0

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0   # 5 → 10Hz (속도 0.9m/s에선 5Hz면 제어 주기당 18cm나 이동)

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.02
      movement_time_allowance: 30.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.25
      stateful: true

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.5
      lookahead_dist: 0.7
      min_lookahead_dist: 0.35
      max_lookahead_dist: 1.5
      use_velocity_scaled_lookahead_dist: true
      max_angular_accel: 3.2
      # 코너/장애물 근처에서는 자동 감속 (속도 올린 만큼 안전장치 활성화)
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      use_cost_regulated_linear_velocity_scaling: true
      transform_tolerance: 1.0
      use_collision_detection: true
      max_robot_pose_search_dist: 10.0

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 1.0   # 목표가 inflation 안이어도 근처 도달 가능 지점으로 계획 허용
      use_astar: true
      allow_unknown: true

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      transform_tolerance: 1.0
      global_frame: odom
      robot_base_frame: base_link
      robot_radius: 0.35
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.05
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_fixed
          clearing: true
          marking: true
          data_type: "LaserScan"
          obstacle_min_range: 0.3
          obstacle_max_range: 3.0
          raytrace_min_range: 0.3
          raytrace_max_range: 3.5
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.7        # 로봇 반경(0.35)의 2배 — 좁은 틈 진입 방지
        cost_scaling_factor: 3.0

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      transform_tolerance: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.35
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        # 정적 맵에 안 찍힌 장애물(가스통 등)을 실시간 스캔으로 전역 경로에 반영
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_fixed
          clearing: true
          marking: true
          data_type: "LaserScan"
          obstacle_min_range: 0.3
          obstacle_max_range: 3.0
          raytrace_min_range: 0.3
          raytrace_max_range: 3.5
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.7        # 로봇 반경(0.35)의 2배
        cost_scaling_factor: 3.0

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "/mnt/c/Users/kimye/OneDrive/CSkim/26-1/Industry-safety-robot/ros2/factory_map.yaml"

collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_nav"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 2.0
    source_timeout: 5.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["StopZone"]
    StopZone:
      type: "circle"
      radius: 0.1
      action_type: "stop"
      min_points: 4
      visualize: true
      polygon_pub_topic: "polygon_stop"
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - controller_server
      - smoother_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
      - collision_monitor


docking_server:
  ros__parameters:
    use_sim_time: false
    dock_plugins: ["simple_charging_dock"]
    simple_charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      use_external_detection_pose: false
      use_battery_status: false

waypoint_follower:
  ros__parameters:
    stop_on_failure: false